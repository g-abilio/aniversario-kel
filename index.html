<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmação de Presença</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #ffffff;
    }

    .convite {
      position: relative;
      width: 100%;
      max-width: 1054px;
      margin: 0 auto;
      line-height: 0;
    }

    .convite img {
      display: block;
      width: 100%;
      height: auto;
    }

    .botao-whatsapp {
      position: absolute;
      left: 37.2%;
      top: 61.2%;
      width: 45.6%;
      height: 17.8%;
      display: block;
      cursor: pointer;
      text-decoration: none;
      background: transparent;
      border-radius: 18px;
    }
  </style>
</head>
<body>
  <main class="convite">
    <img src="convite-referencia.jpeg" alt="Convite de aniversário da Kel" />

    <a
      class="botao-whatsapp"
      href="https://api.whatsapp.com/send?phone=5533984068666&text=Oi%2C%20Kel%21%20Confirmo%20minha%20presen%C3%A7a%20no%20seu%20anivers%C3%A1rio%21"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Confirmar presença pelo WhatsApp"
    ></a>
  </main>
</body>
</html>
